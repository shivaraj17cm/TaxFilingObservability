global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape your Tax Filing API metrics
  - job_name: 'taxfiling-api'
    static_configs:
      - targets: ['taxfiling-api:8080']
    metrics_path: '/metrics'
    scrape_interval: 5s